---
# Per environment values which override defaults in hmpps-launchpad-auth/values.yaml

purge_inactive_users_schedule: "0 13 * * *"

purge_stale_sso_tokens_schedule: "*/10 * * * *"

generic-service:
  # Primary ingress: Frontend HTTPS access
  ingress:
    host: launchpad-auth.hmpps.service.justice.gov.uk

  env:
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: applicationinsights.dev.json
    SPRING_PROFILES_ACTIVE: "prod"
    ENVIRONMENT_NAME: "prod"

  allowlist:
    groups:
      - internal
      - prisons
      - prisoner_facing_services

  # Secondary ingress for API Gateway VPC Link traffic
  # hostname matches default NLB TLS cert CN=*.apps.live.cloud-platform.service.justice.gov.uk
  apiGatewayIngress:
    enabled: true
    className: default
    host: hmpps-launchpad-auth-prod.apps.live.cloud-platform.service.justice.gov.uk
    tlsSecretName: hmpps-launchpad-auth-cert
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: HTTP
      # NLB IPs for API Gateway
      nginx.ingress.kubernetes.io/whitelist-source-range: "172.20.10.238/32,172.20.1.23/32,172.20.6.213/32"

# CloudPlatform AlertManager receiver to route prometheus alerts to slack
# See https://user-guide.cloud-platform.service.justice.gov.uk/documentation/monitoring-an-app/how-to-create-alarms.html#creating-your-own-custom-alerts
generic-prometheus-alerts:
  alertSeverity: hmpps-launchpad
